<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing — IndTaxPay</title>
    <meta name="description" content="Transparent pricing. Build your compliance pack and see totals instantly." />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-base="../">
    <a class="skipLink" href="#main">Skip to content</a>
    <div class="scrollProgress" aria-hidden="true"><div class="scrollProgress__bar"></div></div>
    <div class="loader" id="loader" aria-hidden="true"><div class="chakra" aria-hidden="true"></div></div>
    <div class="cursorDot" aria-hidden="true"></div>
    <div class="cursorRing" aria-hidden="true"></div>
    <div id="navbarSlot"></div>
    <div id="deadlineSlot"></div>

    <main id="main" class="pageFadeIn">
      <section class="section section--tight" aria-label="Pricing header">
        <div class="container">
          <div class="card cardPad">
            <div class="kicker">Pricing</div>
            <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-top: 10px;">Build Your Compliance Pack</h1>
            <p style="margin-top: 10px;">Select services, see totals instantly, and request a CA quote.</p>
          </div>
        </div>
      </section>

      <section class="section" aria-label="Pricing configurator">
        <div class="container">
          <div class="pricingGrid" data-pricing>
            <div class="card cardPad">
              <h2 style="margin:0;">Select Services</h2>
              <div class="stack" style="margin-top: 12px;">
                <label class="pill"><input type="checkbox" data-price-item data-id="itr_basic" data-label="ITR Filing (Salaried)" data-price="999" /> ITR Filing (Salaried) <span class="mono">₹999</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="itr_business" data-label="ITR Filing (Business/44AD)" data-price="2499" /> ITR Filing (Business/44AD) <span class="mono">₹2,499</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="gst_registration" data-label="GST Registration" data-price="1499" /> GST Registration <span class="mono">₹1,499</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="gstr_monthly" data-label="GSTR-1 + 3B (Monthly)" data-price="799" /> GSTR-1 + 3B (Monthly) <span class="mono">₹799</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="tds_return" data-label="TDS Return (per quarter)" data-price="999" /> TDS Return (per quarter) <span class="mono">₹999</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="payroll" data-label="Payroll (up to 10 employees)" data-price="1999" /> Payroll (up to 10 employees) <span class="mono">₹1,999</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="accounting" data-label="Monthly Bookkeeping" data-price="2999" /> Monthly Bookkeeping <span class="mono">₹2,999</span></label>
                <label class="pill"><input type="checkbox" data-price-item data-id="company_reg" data-label="Private Limited Registration" data-price="7999" /> Pvt Ltd Registration <span class="mono">₹7,999</span></label>
              </div>
              <div class="muted" style="margin-top: 12px; font-size: 0.92rem;">Bundle deal: select 3+ services to auto-apply 15% OFF.</div>
            </div>

            <div class="priceSummary">
              <div class="row" style="justify-content: space-between; align-items: baseline;">
                <div style="font-family: var(--font-display); font-weight: 800; font-size: 1.2rem;">Order Summary</div>
                <div class="discount" data-price-discount style="display: none;">Bundle Deal — 15% OFF</div>
              </div>
              <div style="margin-top: 12px;" data-price-summary></div>
              <div class="line" style="margin-top: 12px;">
                <span>Total</span>
                <span class="total" data-price-total>₹0</span>
              </div>
              <div class="row wrap" style="margin-top: 12px;">
                <button class="btn btn-primary" type="button" data-open-chat>Get Custom Quote →</button>
                <button class="btn btn-outline" type="button" data-open-lead>Proceed to Checkout</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footerSlot"></div>
    <script defer src="../assets/js/site.js"></script>
  </body>
</html>
